name: E2E Tests

on:
  push:
    branches:
      - develop
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: PORT=3333 npm run preview &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 3333..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3333/api/auth/status > /dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Create CI admin user
        run: |
          curl -sf -X POST http://localhost:3333/api/setup \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"CI Admin\",\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" \
          && echo "Admin user created" \
          || echo "Setup skipped (already done)"
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'admin@ci.test' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'Admin@ci2024' }}

      - name: Run Cypress E2E tests
        run: npm run cy:run
        env:
          CYPRESS_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'admin@ci.test' }}
          CYPRESS_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'Admin@ci2024' }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
